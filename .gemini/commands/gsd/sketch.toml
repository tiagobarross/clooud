description = "Sketch UI/design ideas with throwaway HTML mockups, or propose what to sketch next (frontier mode)"
prompt = "<objective>\nExplore design directions through throwaway HTML mockups before committing to implementation.\nEach sketch produces 2-3 variants for comparison. Sketches live in `.planning/sketches/` and\nintegrate with GSD commit patterns, state tracking, and handoff workflows. Loads spike\nfindings to ground mockups in real data shapes and validated interaction patterns.\n\nTwo modes:\n- **Idea mode** (default) — describe a design idea to sketch\n- **Frontier mode** (no argument or \"frontier\") — analyzes existing sketch landscape and proposes consistency and frontier sketches\n\nDoes not require prior new-project setup — auto-creates `.planning/sketches/` if needed.\n</objective>\n\n<execution_context>\n@C:/Users/tiago/OneDrive/Área de Trabalho/geral/Estudos DEV/clooud/.gemini/get-shit-done/workflows/sketch.md\n@C:/Users/tiago/OneDrive/Área de Trabalho/geral/Estudos DEV/clooud/.gemini/get-shit-done/workflows/sketch-wrap-up.md\n@C:/Users/tiago/OneDrive/Área de Trabalho/geral/Estudos DEV/clooud/.gemini/get-shit-done/references/ui-brand.md\n@C:/Users/tiago/OneDrive/Área de Trabalho/geral/Estudos DEV/clooud/.gemini/get-shit-done/references/sketch-theme-system.md\n@C:/Users/tiago/OneDrive/Área de Trabalho/geral/Estudos DEV/clooud/.gemini/get-shit-done/references/sketch-interactivity.md\n@C:/Users/tiago/OneDrive/Área de Trabalho/geral/Estudos DEV/clooud/.gemini/get-shit-done/references/sketch-tooling.md\n@C:/Users/tiago/OneDrive/Área de Trabalho/geral/Estudos DEV/clooud/.gemini/get-shit-done/references/sketch-variant-patterns.md\n</execution_context>\n\n<runtime_note>\n**Copilot (VS Code):** Use `vscode_askquestions` wherever this workflow calls `conversational prompting`.\n</runtime_note>\n\n<context>\nDesign idea: $ARGUMENTS\n\n**Available flags:**\n- `--quick` — Skip mood/direction intake, jump straight to decomposition and building. Use when the design direction is already clear.\n- `--wrap-up` — Package sketch design findings into a persistent project skill for future build conversations. Runs the sketch-wrap-up workflow.\n</context>\n\n<process>\nParse the first token of $ARGUMENTS:\n- If it is `--wrap-up`: strip the flag, execute the sketch-wrap-up workflow end-to-end.\n- Otherwise: execute the sketch workflow end-to-end.\n\nPreserve all workflow gates (intake, decomposition, target stack research, variant evaluation, MANIFEST updates, commit patterns).\n</process>"
